[custom]

; ===================================
; 全局节点
; ===================================

custom_proxy_group=所有-手选`select`[]DIRECT`.*`
custom_proxy_group=所有-智选`url-test`.*`https://www.gstatic.com/generate_204`300,,50

; ===================================
; 地区节点
; ===================================

custom_proxy_group=香港`url-test`(?=.*(香港|HK|Hong Kong|🇭🇰))`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=台湾`url-test`(?=.*(台湾|TW|Taiwan|🇹🇼))`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=日本`url-test`(?=.*(日本|JP|Japan|🇯🇵))`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=新加坡`url-test`(?=.*(新加坡|SG|Singapore|🇸🇬))`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=韩国`url-test`(?=.*(韩国|KR|Korea|🇰🇷))`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=美国`url-test`(?=.*(美国|US|United States|🇺🇸))`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=英国`url-test`(?=.*(英国|UK|United Kingdom|🇬🇧))`https://www.gstatic.com/generate_204`300,,50

; ===================================
; 故障转移
; ===================================

custom_proxy_group=香港-故转`fallback`[]香港[]所有-智选
custom_proxy_group=台湾-故转`fallback`[]台湾[]所有-智选
custom_proxy_group=日本-故转`fallback`[]日本[]所有-智选
custom_proxy_group=新加坡-故转`fallback`[]新加坡[]所有-智选
custom_proxy_group=韩国-故转`fallback`[]韩国[]所有-智选
custom_proxy_group=美国-故转`fallback`[]美国[]所有-智选
custom_proxy_group=英国-故转`fallback`[]英国[]所有-智选

; ===================================
; AI 服务
; ===================================

custom_proxy_group=ChatGPT`select`[]日本-故转[]美国-故转[]香港-故转[]所有-智选
custom_proxy_group=Claude`select`[]美国-故转[]日本-故转[]所有-智选
custom_proxy_group=Gemini`select`[]日本-故转[]美国-故转[]所有-智选
custom_proxy_group=Copilot`select`[]日本-故转[]所有-智选
custom_proxy_group=Perplexity`select`[]日本-故转[]美国-故转[]所有-智选
custom_proxy_group=MetaAI`select`[]美国-故转[]所有-智选

; ===================================
; 社交媒体
; ===================================

custom_proxy_group=Telegram`select`[]所有-智选
custom_proxy_group=WhatsApp`select`[]所有-智选
custom_proxy_group=Facebook`select`[]所有-智选
custom_proxy_group=Reddit`select`[]所有-智选
custom_proxy_group=TikTok`select`[]日本-故转[]美国-故转[]所有-智选

; ===================================
; 流媒体
; ===================================

custom_proxy_group=Netflix`select`[]日本-故转[]香港-故转[]美国-故转[]所有-智选
custom_proxy_group=Disney`select`[]日本-故转[]香港-故转[]所有-智选
custom_proxy_group=HBO`select`[]美国-故转[]所有-智选
custom_proxy_group=Crunchyroll`select`[]日本-故转[]所有-智选
custom_proxy_group=Spotify`select`[]所有-智选
custom_proxy_group=YouTube`select`[]香港-故转[]日本-故转[]所有-智选

; ===================================
; 开发工具
; ===================================

custom_proxy_group=GitHub`select`[]所有-智选
custom_proxy_group=Google`select`[]所有-智选
custom_proxy_group=Microsoft`select`[]所有-智选
custom_proxy_group=Apple`select`[]DIRECT[]所有-智选

; ===================================
; 游戏
; ===================================

custom_proxy_group=Steam`select`[]所有-智选
custom_proxy_group=Games`select`[]所有-智选

; ===================================
; 加密货币
; ===================================

custom_proxy_group=Crypto`select`[]所有-智选

; ===================================
; 默认策略
; ===================================

custom_proxy_group=国外`select`[]所有-智选[]香港[]日本[]美国
custom_proxy_group=国内`select`[]DIRECT
custom_proxy_group=其他`select`[]所有-智选[]DIRECT

